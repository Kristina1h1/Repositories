<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
    #container {
            text-align: center;
            margin-top: 50px;
        }
    input[type="number"] {
            width: 60px;
            padding: 5px;
            font-size: 16px;
        }
        input[type="button"] {
            padding: 8px 20px;
            font-size: 16px;
            cursor: pointer;
        }
</style>
</head>
<body>
<div id="container">
    <div>
        <img src="1.jpg" alt="" id="image1">
        <img src="3.jpg" alt="" id="image2">
        <img src="2.jpeg" alt="" id="image3">
    </div>
    <p>
        поменять <input type="number" min="1" max="3" id="change">
        на <input type="number" min="1" max="3" id="on">
    </p>
    <p>
        <input type="button" value="поменять" id="btn">
    </p>
</div>

    <script src="script.js"></script>
</body>
</html>
