
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пастельные тона</title>
</head>
<body>
    <form name="form3">
        <fieldset>
            <legend><b>Выберите пастельный цвет:</b></legend>
            <label for="pink">
                <input type="radio" name="radio2" value="#FFB7B2" id="pink"> нежно-розовый <br>
            </label>
            <label for="peach">
                <input type="radio" name="radio2" value="#FFDAB9" id="peach"> персиковый <br>
            </label>
            <label for="mint">
                <input type="radio" name="radio2" value="#98FB98" id="mint"> мятный <br>
            </label>
            <label for="lavender">
                <input type="radio" name="radio2" value="#E6E6FA" id="lavender"> лавандовый <br>
            </label>
            <label for="blue">
                <input type="radio" name="radio2" value="#ADD8E6" id="blue"> небесно-голубой <br>
            </label>
            <input type="button" value="Выбрать">
        </fieldset>
    </form>

    <script src="script.js"></script>
</body>
</html>
